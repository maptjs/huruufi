name: huruufi
description: "حروفي - تطبيق تعلم الحروف العربية للأطفال"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # تخزين محلي للتقدم
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # التتبع بالإصبع على الحروف
  signature: ^5.4.1

  # نطق الحروف والكلمات بمحرك النظام (بلا ملفات صوت مسجلة)
  flutter_tts: ^4.0.0

  # الرسوم المتحركة
  lottie: ^3.1.0

  # إدارة الحالة
  provider: ^6.1.1

  # الخطوط العربية
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
